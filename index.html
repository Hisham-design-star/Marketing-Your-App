<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سوِّق تطبيقك | Pi Network</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #ffac00;
            --dark-gray: #121212;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--dark-gray);
            color: #ffffff;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .app-container {
            width: 90%;
            max-width: 400px;
            background: linear-gradient(145deg, #1e1e1e, #0f0f0f);
            border-radius: 30px;
            padding: 35px 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            border: 1px solid rgba(255, 172, 0, 0.1);
            text-align: center;
        }

        .header-icon { font-size: 50px; margin-bottom: 10px; filter: drop-shadow(0 0 10px var(--gold)); }
        h1 { font-size: 24px; color: var(--gold); margin-bottom: 5px; }
        .tagline { color: #888; font-size: 13px; margin-bottom: 25px; }

        .feature-box {
            background: var(--glass);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 12px;
            border-right: 4px solid var(--gold);
            text-align: right;
        }

        .feature-box strong { display: block; color: var(--gold); font-size: 14px; }
        .feature-box span { font-size: 12px; color: #ccc; }

        .btn-main {
            background: linear-gradient(90deg, #ffac00, #f29300);
            color: #000;
            border: none;
            padding: 16px;
            border-radius: 15px;
            width: 100%;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(255, 172, 0, 0.2);
            margin-top: 10px;
        }

        .contact-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-outline {
            text-decoration: none;
            padding: 12px;
            border-radius: 12px;
            font-size: 13px;
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.03);
        }

        #status-msg { margin-top: 15px; font-size: 12px; color: #ffeb3b; min-height: 18px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header-icon">🛡️</div>
    <h1>سوِّق تطبيقك</h1>
    <p class="tagline">بوابتك الآمنة لتحليل ونمو مشاريع Pi Network</p>

    <div class="feature-box">
        <strong>التحليل الفني المعمق</strong>
        <span>دراسة جدوى متكاملة لمشروعك البرمجي.</span>
    </div>
    <div class="feature-box">
        <strong>جذب المستثمرين</strong>
        <span>تحويل الكود إلى فرصة استثمارية حقيقية.</span>
    </div>

    <button id="pay-button" class="btn-main" onclick="handlePiPayment()">ابدأ التحليل بـ 20 π</button>
    <div id="status-msg">جاهز لبدء العملية..</div>

    <div class="contact-grid">
        <a href="https://wa.me/201013789005" target="_blank" rel="noopener noreferrer" class="btn-outline">واتساب 💬</a>
        <a href="https://t.me/201013789005" target="_blank" rel="noopener noreferrer" class="btn-outline">تليجرام ✈️</a>
    </div>
</div>

<script>
    // تهيئة SDK باي
    const Pi = window.Pi;
    Pi.init({ version: "2.0" });

    async function handlePiPayment() {
        const status = document.getElementById('status-msg');
        
        try {
            status.innerText = "جاري المصادقة مع الشبكة...";
            
            // 1. طلب الصلاحيات (لحل مشكلة Scope التي ظهرت في صورتك)
            const scopes = ['payments'];
            await Pi.authenticate(scopes, (payment) => {
                console.log("Incomplete payment found:", payment);
            });

            status.innerText = "جاري فتح المحفظة لتأكيد الدفع...";

            // 2. إنشاء عملية الدفع
            const payment = await Pi.createPayment({
                amount: 20,
                memo: "رسوم تحليل مشروع - سوِّق تطبيقك",
                metadata: { project: "Technical_Incubator" },
            }, {
                onReadyForServerApproval: (paymentId) => {
                    status.innerText = "بانتظار موافقة الشبكة النهائية..";
                },
                onReadyForServerCompletion: (paymentId, txid) => {
                    status.style.color = "#4caf50";
                    status.innerText = "تم الدفع بنجاح! تواصل معنا عبر واتساب الآن.";
                    alert("عملية ناجحة! رقم المعاملة: " + txid);
                },
                onCancel: (paymentId) => {
                    status.innerText = "تم إلغاء العملية من قبلك.";
                },
                onError: (error, payment) => {
                    status.innerText = "خطأ: " + error.message;
                },
            });

        } catch (err) {
            status.innerText = "فشل: تأكد من استخدام Pi Browser";
            console.error(err);
        }
    }
</script>

</body>
</html>
