<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاضنة سوِّق تطبيقك | Pi Network</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #ffac00;
            --deep-purple: #2d004d;
            --dark-gray: #121212;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--dark-gray);
            color: #ffffff;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* حاوية الفخامة التقنية */
        .app-container {
            width: 90%;
            max-width: 450px;
            background: linear-gradient(145deg, #1e1e1e, #121212);
            border-radius: 30px;
            padding: 40px 25px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            border: 1px solid rgba(255, 172, 0, 0.2);
            text-align: center;
        }

        .header-icon {
            font-size: 60px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px var(--gold));
        }

        h1 { font-size: 24px; color: var(--gold); margin-bottom: 10px; }
        p.tagline { color: #aaa; font-size: 14px; margin-bottom: 30px; }

        /* مميزات الحاضنة */
        .features {
            text-align: right;
            margin-bottom: 35px;
        }
        .feature-box {
            background: var(--glass);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 12px;
            border-right: 4px solid var(--gold);
        }
        .feature-box strong { display: block; color: var(--gold); }
        .feature-box span { font-size: 13px; color: #ccc; }

        /* أزرار العمليات */
        .btn-main {
            background: linear-gradient(90deg, #ffac00, #ff8000);
            color: #000;
            border: none;
            padding: 18px;
            border-radius: 15px;
            width: 100%;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(255, 172, 0, 0.3);
            transition: 0.3s;
        }

        .contact-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-outline {
            text-decoration: none;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }
        .btn-outline:hover { background: var(--glass); border-color: var(--gold); }

        #status-msg { margin-top: 15px; font-size: 13px; color: #ffeb3b; min-height: 20px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header-icon">🛡️</div>
    <h1>سوِّق تطبيقك</h1>
    <p class="tagline">بوابتك الآمنة لتحليل ونجاح مشاريع Pi Network</p>

    <div class="features">
        <div class="feature-box">
            <strong>التحليل الاقتصادي العميق</strong>
            <span>دراسة جدوى تقنية تضمن استدامة مشروعك.</span>
        </div>
        <div class="feature-box">
            <strong>التسويق للمستثمرين</strong>
            <span>نحول فكرتك البرمجية إلى لغة استثمارية جذابة.</span>
        </div>
    </div>

    <button id="pay-button" class="btn-main" onclick="transferPi()">ابدأ التحليل بـ 20 π</button>
    <div id="status-msg">جاهز لبدء العملية..</div>

    <div class="contact-grid">
        <a href="https://wa.me/201013789005" class="btn-outline">واتساب 💬</a>
        <a href="https://t.me/201013789005" class="btn-outline">تليجرام ✈️</a>
    </div>
</div>

<script>
    const Pi = window.Pi;
    Pi.init({ version: "2.0" });

    async function transferPi() {
        const status = document.getElementById('status-msg');
        status.innerText = "جاري فتح المحفظة لتأكيد الدفع...";

        try {
            const payment = await Pi.createPayment({
                amount: 20,
                memo: "رسوم تحليل مشروع تقني - حاضنة سوِّق تطبيقك",
                metadata: { type: "investment_analysis" },
            }, {
                onReadyForServerApproval: (paymentId) => {
                    status.innerText = "بانتظار الموافقة النهائية من الشبكة..";
                },
                onReadyForServerCompletion: (paymentId, txid) => {
                    status.style.color = "#4caf50";
                    status.innerText = "تمت العملية بنجاح! تواصل معنا الآن لإرسال بياناتك.";
                    alert("تم الدفع بنجاح! رقم المعاملة: " + txid);
                },
                onCancel: (paymentId) => { status.innerText = "تم إلغاء عملية الدفع."; },
                onError: (error, payment) => { status.innerText = "خطأ: " + error.message; },
            });
        } catch (err) {
            status.innerText = "فشل الربط: " + err.message;
        }
    }
</script>

</body>
</html>
